<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>專案儀表板</title>
<style>
  :root {
    color-scheme: light;
    --page:           #f9f9f7;
    --surface:        #fcfcfb;
    --text-primary:   #0b0b0b;
    --text-secondary: #52514e;
    --text-muted:     #898781;
    --hairline:       #e1e0d9;
    --border:         rgba(11,11,11,0.10);
    --series-1:       #2a78d6;
    --good:           #0ca30c;
    --good-text:      #006300;
    --warning:        #fab219;
    --serious:        #ec835a;
    --critical:       #d03b3b;
    --track:          #f0efec;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      color-scheme: dark;
      --page:           #0d0d0d;
      --surface:        #1a1a19;
      --text-primary:   #ffffff;
      --text-secondary: #c3c2b7;
      --text-muted:     #898781;
      --hairline:       #2c2c2a;
      --border:         rgba(255,255,255,0.10);
      --series-1:       #3987e5;
      --good:           #0ca30c;
      --good-text:      #0ca30c;
      --track:          #383835;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: var(--page);
    color: var(--text-primary);
    line-height: 1.55;
  }
  .wrap { max-width: 1080px; margin: 0 auto; padding: 20px 16px 60px; }

  header { display: flex; flex-wrap: wrap; align-items: baseline; gap: 8px 16px; margin-bottom: 18px; }
  header h1 { font-size: 1.35rem; font-weight: 700; }
  #updated { font-size: 0.8rem; color: var(--text-muted); }

  .tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 22px; }
  .tile {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 14px 16px;
  }
  .tile .label { font-size: 0.78rem; color: var(--text-secondary); }
  .tile .value { font-size: 1.9rem; font-weight: 700; margin-top: 2px; }
  .tile .value.alert { color: var(--critical); }

  h2 { font-size: 1.02rem; font-weight: 700; margin: 26px 0 12px; color: var(--text-primary); }

  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }
  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    padding: 18px; display: flex; flex-direction: column; gap: 12px;
  }
  .card-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
  .card-head h3 { font-size: 1rem; font-weight: 700; }

  .pill {
    font-size: 0.72rem; font-weight: 600; padding: 3px 10px; border-radius: 999px;
    white-space: nowrap; border: 1px solid var(--border); color: var(--text-secondary);
  }
  .pill.active { color: var(--series-1); border-color: var(--series-1); }
  .pill.done   { color: var(--good-text); border-color: var(--good); }
  .pill.paused { color: var(--text-muted); }

  .progress-row { display: flex; align-items: center; gap: 10px; }
  .progress-track { flex: 1; height: 8px; background: var(--track); border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--series-1); border-radius: 4px; transition: width 0.4s ease; }
  .progress-fill.full { background: var(--good); }
  .progress-num { font-size: 0.82rem; font-weight: 600; color: var(--text-secondary); min-width: 38px; text-align: right; font-variant-numeric: tabular-nums; }

  .deadline { font-size: 0.82rem; color: var(--text-secondary); display: flex; align-items: center; gap: 6px; }
  .deadline .due-soon { color: var(--serious); font-weight: 600; }
  .deadline .overdue  { color: var(--critical); font-weight: 600; }

  ul.tasks { list-style: none; display: flex; flex-direction: column; gap: 6px; }
  ul.tasks li { display: flex; align-items: flex-start; gap: 8px; font-size: 0.88rem; }
  ul.tasks li .box {
    width: 16px; height: 16px; border-radius: 5px; border: 1.5px solid var(--text-muted);
    flex-shrink: 0; margin-top: 3px; display: inline-flex; align-items: center; justify-content: center;
    font-size: 11px; color: #fff;
  }
  ul.tasks li.done .box { background: var(--good); border-color: var(--good); }
  ul.tasks li.done .txt { color: var(--text-muted); text-decoration: line-through; }

  .notes { border-top: 1px solid var(--hairline); padding-top: 10px; display: flex; flex-direction: column; gap: 6px; }
  .note { font-size: 0.82rem; color: var(--text-secondary); }
  .note .d { color: var(--text-muted); font-variant-numeric: tabular-nums; margin-right: 6px; }

  .feed { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px 18px; display: flex; flex-direction: column; gap: 10px; }
  .feed-item { font-size: 0.88rem; display: flex; gap: 10px; align-items: baseline; }
  .feed-item .d { color: var(--text-muted); font-size: 0.78rem; font-variant-numeric: tabular-nums; white-space: nowrap; }
  .feed-item .p { color: var(--series-1); font-weight: 600; white-space: nowrap; }
  .feed-item .t { color: var(--text-secondary); }

  .empty { color: var(--text-muted); font-size: 0.9rem; padding: 30px 0; text-align: center; }
  footer { margin-top: 34px; font-size: 0.75rem; color: var(--text-muted); text-align: center; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>📋 專案儀表板</h1>
    <span id="updated"></span>
  </header>

  <div class="tiles">
    <div class="tile"><div class="label">進行中專案</div><div class="value" id="stat-active">–</div></div>
    <div class="tile"><div class="label">未完成待辦</div><div class="value" id="stat-todo">–</div></div>
    <div class="tile"><div class="label">7 天內截止</div><div class="value" id="stat-due">–</div></div>
    <div class="tile"><div class="label">已完成專案</div><div class="value" id="stat-done">–</div></div>
  </div>

  <h2>專案</h2>
  <div class="cards" id="cards"></div>

  <h2>最新動態</h2>
  <div class="feed" id="feed"></div>

  <footer>透過 Telegram 跟猿田彥說話即可更新此頁 · 每 60 秒自動重新整理</footer>
</div>

<script>
const STATUS = {
  active: { label: '進行中', cls: 'active' },
  done:   { label: '已完成', cls: 'done' },
  paused: { label: '暫停中', cls: 'paused' }
};

function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function daysUntil(dateStr) {
  if (!dateStr) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(dateStr + 'T00:00:00');
  if (isNaN(d)) return null;
  return Math.round((d - today) / 86400000);
}

function deadlineHtml(dateStr, status) {
  if (!dateStr) return '';
  const n = daysUntil(dateStr);
  let extra = '';
  if (status !== 'done' && n !== null) {
    if (n < 0)       extra = `<span class="overdue">⚠ 已逾期 ${-n} 天</span>`;
    else if (n === 0) extra = `<span class="due-soon">⏰ 今天截止</span>`;
    else if (n <= 7)  extra = `<span class="due-soon">⏰ 剩 ${n} 天</span>`;
    else              extra = `<span>剩 ${n} 天</span>`;
  }
  return `<div class="deadline">📅 截止 ${esc(dateStr)} ${extra}</div>`;
}

function render(data) {
  const projects = data.projects || [];

  const active = projects.filter(p => p.status === 'active').length;
  const done   = projects.filter(p => p.status === 'done').length;
  const todo   = projects.flatMap(p => p.tasks || []).filter(t => !t.done).length;
  const dueSoon = projects.filter(p => {
    if (p.status === 'done') return false;
    const n = daysUntil(p.deadline);
    return n !== null && n >= 0 && n <= 7;
  }).length;

  document.getElementById('stat-active').textContent = active;
  document.getElementById('stat-todo').textContent = todo;
  document.getElementById('stat-done').textContent = done;
  const dueEl = document.getElementById('stat-due');
  dueEl.textContent = dueSoon;
  dueEl.classList.toggle('alert', dueSoon > 0);

  const order = { active: 0, paused: 1, done: 2 };
  const sorted = [...projects].sort((a, b) => (order[a.status] ?? 9) - (order[b.status] ?? 9));

  document.getElementById('cards').innerHTML = sorted.length ? sorted.map(p => {
    const st = STATUS[p.status] || { label: p.status, cls: '' };
    const prog = Math.max(0, Math.min(100, Number(p.progress) || 0));
    const tasks = (p.tasks || []).map(t =>
      `<li class="${t.done ? 'done' : ''}"><span class="box">${t.done ? '✓' : ''}</span><span class="txt">${esc(t.text)}</span></li>`
    ).join('');
    const notes = (p.notes || []).slice(0, 2).map(n =>
      `<div class="note"><span class="d">${esc(n.date)}</span>${esc(n.text)}</div>`
    ).join('');
    return `<div class="card">
      <div class="card-head"><h3>${esc(p.name)}</h3><span class="pill ${st.cls}">${esc(st.label)}</span></div>
      <div class="progress-row">
        <div class="progress-track"><div class="progress-fill ${prog >= 100 ? 'full' : ''}" style="width:${prog}%"></div></div>
        <span class="progress-num">${prog}%</span>
      </div>
      ${deadlineHtml(p.deadline, p.status)}
      ${tasks ? `<ul class="tasks">${tasks}</ul>` : ''}
      ${notes ? `<div class="notes">${notes}</div>` : ''}
    </div>`;
  }).join('') : '<div class="empty">目前沒有專案，跟猿田彥說「新增專案」開始吧</div>';

  const feed = projects
    .flatMap(p => (p.notes || []).map(n => ({ ...n, project: p.name })))
    .sort((a, b) => (b.date || '').localeCompare(a.date || ''))
    .slice(0, 10);
  document.getElementById('feed').innerHTML = feed.length ? feed.map(n =>
    `<div class="feed-item"><span class="d">${esc(n.date)}</span><span class="p">${esc(n.project)}</span><span class="t">${esc(n.text)}</span></div>`
  ).join('') : '<div class="empty">還沒有任何動態</div>';

  if (data.updated) {
    const d = new Date(data.updated);
    document.getElementById('updated').textContent = isNaN(d) ? '' :
      `最後更新 ${d.toLocaleString('zh-TW', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit', hour12: false })}`;
  }
}

async function load() {
  try {
    const res = await fetch('data.json?t=' + Date.now(), { cache: 'no-store' });
    if (!res.ok) throw new Error(res.status);
    render(await res.json());
  } catch (e) {
    document.getElementById('updated').textContent = '⚠ 資料載入失敗';
  }
}

load();
setInterval(load, 60000);
</script>
</body>
</html>
