<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>專案儀表板</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    color-scheme: dark;
    --page:           #05060f;
    --surface:        rgba(13, 16, 32, 0.85);
    --text-primary:   #e8f6ff;
    --text-secondary: #8fa3c8;
    --text-muted:     #56618a;
    --hairline:       rgba(0, 240, 255, 0.12);
    --border:         rgba(0, 240, 255, 0.22);
    --cyan:           #00f0ff;
    --magenta:        #ff2ec4;
    --violet:         #9d4dff;
    --lime:           #39ff88;
    --amber:          #ffc832;
    --hotred:         #ff3860;
    --track:          rgba(0, 240, 255, 0.08);
    --mono: "Share Tech Mono", ui-monospace, monospace;
    --display: "Orbitron", system-ui, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: system-ui, -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: var(--page);
    color: var(--text-primary);
    line-height: 1.55;
    background-image:
      linear-gradient(rgba(0, 240, 255, 0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 240, 255, 0.035) 1px, transparent 1px),
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(157, 77, 255, 0.18), transparent),
      radial-gradient(ellipse 60% 40% at 90% 110%, rgba(255, 46, 196, 0.10), transparent);
    background-size: 42px 42px, 42px 42px, 100% 100%, 100% 100%;
    background-attachment: fixed;
    min-height: 100vh;
  }
  .wrap { max-width: 1080px; margin: 0 auto; padding: 24px 16px 60px; }

  header { display: flex; flex-wrap: wrap; align-items: baseline; gap: 8px 16px; margin-bottom: 22px; }
  header h1 {
    font-family: var(--display);
    font-size: 1.4rem; font-weight: 700; letter-spacing: 0.12em;
    color: var(--cyan);
    text-shadow: 0 0 8px rgba(0,240,255,0.8), 0 0 28px rgba(0,240,255,0.45);
  }
  header h1 .accent { color: var(--magenta); text-shadow: 0 0 8px rgba(255,46,196,0.8), 0 0 28px rgba(255,46,196,0.45); }
  #updated { font-size: 0.78rem; color: var(--text-muted); font-family: var(--mono); letter-spacing: 0.05em; }

  .tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 26px; }
  .tile {
    background: var(--surface);
    border: 1px solid var(--border); border-radius: 4px;
    padding: 14px 16px;
    position: relative;
    box-shadow: 0 0 18px rgba(0, 240, 255, 0.06), inset 0 0 24px rgba(0, 240, 255, 0.03);
    clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 14px 100%, 0 calc(100% - 14px));
  }
  .tile::before {
    content: ""; position: absolute; top: 0; left: 0; width: 34px; height: 2px;
    background: var(--cyan); box-shadow: 0 0 8px var(--cyan);
  }
  .tile .label { font-size: 0.74rem; color: var(--text-secondary); letter-spacing: 0.14em; }
  .tile .value {
    font-family: var(--display);
    font-size: 1.9rem; font-weight: 700; margin-top: 3px; color: var(--text-primary);
    text-shadow: 0 0 12px rgba(232, 246, 255, 0.35);
  }
  .tile .value.alert { color: var(--hotred); text-shadow: 0 0 10px rgba(255,56,96,0.9), 0 0 30px rgba(255,56,96,0.5); }

  h2 {
    font-family: var(--display);
    font-size: 0.95rem; font-weight: 700; margin: 30px 0 14px;
    color: var(--magenta); letter-spacing: 0.22em;
    text-shadow: 0 0 8px rgba(255,46,196,0.7);
    display: flex; align-items: center; gap: 12px;
  }
  h2::after { content: ""; flex: 1; height: 1px; background: linear-gradient(90deg, rgba(255,46,196,0.5), transparent); }

  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }
  .card {
    background: var(--surface);
    border: 1px solid var(--border); border-radius: 4px;
    padding: 18px; display: flex; flex-direction: column; gap: 12px;
    position: relative;
    box-shadow: 0 0 22px rgba(0, 240, 255, 0.05), inset 0 0 30px rgba(0, 240, 255, 0.02);
    clip-path: polygon(0 0, calc(100% - 16px) 0, 100% 16px, 100% 100%, 16px 100%, 0 calc(100% - 16px));
    transition: box-shadow 0.25s, border-color 0.25s;
  }
  .card:hover { border-color: rgba(0, 240, 255, 0.55); box-shadow: 0 0 30px rgba(0, 240, 255, 0.16), inset 0 0 30px rgba(0, 240, 255, 0.04); }
  .card::before {
    content: ""; position: absolute; top: 0; left: 0; width: 46px; height: 2px;
    background: linear-gradient(90deg, var(--cyan), var(--magenta));
    box-shadow: 0 0 10px rgba(0,240,255,0.7);
  }
  .card-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
  .card-head h3 { font-size: 1rem; font-weight: 700; color: var(--text-primary); }

  .pill {
    font-family: var(--mono);
    font-size: 0.7rem; padding: 3px 10px; border-radius: 2px;
    white-space: nowrap; letter-spacing: 0.1em;
    border: 1px solid var(--text-muted); color: var(--text-muted);
  }
  .pill.active { color: var(--cyan); border-color: var(--cyan); box-shadow: 0 0 8px rgba(0,240,255,0.4), inset 0 0 8px rgba(0,240,255,0.08); text-shadow: 0 0 6px rgba(0,240,255,0.8); }
  .pill.done   { color: var(--lime); border-color: var(--lime); box-shadow: 0 0 8px rgba(57,255,136,0.4), inset 0 0 8px rgba(57,255,136,0.08); text-shadow: 0 0 6px rgba(57,255,136,0.8); }
  .pill.paused { color: var(--violet); border-color: rgba(157,77,255,0.6); text-shadow: 0 0 6px rgba(157,77,255,0.6); }

  .progress-row { display: flex; align-items: center; gap: 10px; }
  .progress-track {
    flex: 1; height: 8px; background: var(--track); border-radius: 2px; overflow: hidden;
    border: 1px solid rgba(0, 240, 255, 0.15);
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--cyan), var(--magenta));
    box-shadow: 0 0 10px rgba(0, 240, 255, 0.7);
    transition: width 0.4s ease;
  }
  .progress-fill.full { background: linear-gradient(90deg, var(--lime), var(--cyan)); box-shadow: 0 0 10px rgba(57,255,136,0.7); }
  .progress-num {
    font-family: var(--mono);
    font-size: 0.85rem; color: var(--cyan); min-width: 42px; text-align: right;
    text-shadow: 0 0 6px rgba(0,240,255,0.6);
  }

  .team { display: flex; flex-wrap: wrap; gap: 6px; }
  .member {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 0.76rem; padding: 2px 8px; border-radius: 2px;
    border: 1px solid rgba(157, 77, 255, 0.45);
    background: rgba(157, 77, 255, 0.08);
  }
  .member .role { font-family: var(--mono); color: var(--violet); letter-spacing: 0.08em; text-shadow: 0 0 6px rgba(157,77,255,0.5); }
  .member .name { color: var(--text-primary); font-weight: 600; }

  .deadline { font-size: 0.82rem; color: var(--text-secondary); display: flex; align-items: center; gap: 6px; font-family: var(--mono); }
  .deadline .due-soon { color: var(--amber); text-shadow: 0 0 8px rgba(255,200,50,0.7); }
  .deadline .overdue  { color: var(--hotred); text-shadow: 0 0 8px rgba(255,56,96,0.8); }

  ul.tasks { list-style: none; display: flex; flex-direction: column; gap: 6px; }
  ul.tasks li { display: flex; align-items: flex-start; gap: 8px; font-size: 0.88rem; }
  ul.tasks li .box {
    width: 15px; height: 15px; border-radius: 2px; border: 1px solid var(--text-muted);
    flex-shrink: 0; margin-top: 4px; display: inline-flex; align-items: center; justify-content: center;
    font-size: 11px; color: var(--page); background: transparent;
  }
  ul.tasks li.done .box { background: var(--lime); border-color: var(--lime); box-shadow: 0 0 8px rgba(57,255,136,0.6); }
  ul.tasks li.done .txt { color: var(--text-muted); text-decoration: line-through; }

  .notes { border-top: 1px solid var(--hairline); padding-top: 10px; display: flex; flex-direction: column; gap: 6px; }
  .note { font-size: 0.82rem; color: var(--text-secondary); }
  .note .d { color: var(--violet); font-family: var(--mono); margin-right: 6px; font-size: 0.76rem; }

  .feed {
    background: var(--surface); border: 1px solid var(--border); border-radius: 4px;
    padding: 16px 18px; display: flex; flex-direction: column; gap: 10px;
    box-shadow: 0 0 22px rgba(157, 77, 255, 0.06);
    clip-path: polygon(0 0, calc(100% - 16px) 0, 100% 16px, 100% 100%, 16px 100%, 0 calc(100% - 16px));
    position: relative;
  }
  .feed::before {
    content: ""; position: absolute; top: 0; left: 0; width: 46px; height: 2px;
    background: var(--violet); box-shadow: 0 0 10px rgba(157,77,255,0.7);
  }
  .feed-item { font-size: 0.88rem; display: flex; gap: 10px; align-items: baseline; }
  .feed-item .d { color: var(--text-muted); font-family: var(--mono); font-size: 0.76rem; white-space: nowrap; }
  .feed-item .p { color: var(--cyan); font-weight: 600; white-space: nowrap; text-shadow: 0 0 6px rgba(0,240,255,0.5); }
  .feed-item .t { color: var(--text-secondary); }

  .empty { color: var(--text-muted); font-size: 0.9rem; padding: 30px 0; text-align: center; font-family: var(--mono); }
  footer { margin-top: 38px; font-size: 0.72rem; color: var(--text-muted); text-align: center; font-family: var(--mono); letter-spacing: 0.08em; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>▍PROJECT <span class="accent">DASHBOARD</span></h1>
    <span id="updated"></span>
  </header>

  <div class="tiles">
    <div class="tile"><div class="label">進行中專案</div><div class="value" id="stat-active">–</div></div>
    <div class="tile"><div class="label">未完成待辦</div><div class="value" id="stat-todo">–</div></div>
    <div class="tile"><div class="label">7 天內截止</div><div class="value" id="stat-due">–</div></div>
    <div class="tile"><div class="label">已完成專案</div><div class="value" id="stat-done">–</div></div>
  </div>

  <h2>PROJECTS ／ 專案</h2>
  <div class="cards" id="cards"></div>

  <h2>ACTIVITY ／ 最新動態</h2>
  <div class="feed" id="feed"></div>

  <footer>SYNC VIA TELEGRAM ⟩ 猿田彥 ／ AUTO-REFRESH 60s</footer>
</div>

<script>
const STATUS = {
  active: { label: 'ACTIVE 進行中', cls: 'active' },
  done:   { label: 'DONE 已完成', cls: 'done' },
  paused: { label: 'PAUSED 暫停', cls: 'paused' }
};

function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function daysUntil(dateStr) {
  if (!dateStr) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(dateStr + 'T00:00:00');
  if (isNaN(d)) return null;
  return Math.round((d - today) / 86400000);
}

function deadlineHtml(dateStr, status) {
  if (!dateStr) return '';
  const n = daysUntil(dateStr);
  let extra = '';
  if (status !== 'done' && n !== null) {
    if (n < 0)       extra = `<span class="overdue">⚠ 已逾期 ${-n} 天</span>`;
    else if (n === 0) extra = `<span class="due-soon">⏰ 今天截止</span>`;
    else if (n <= 7)  extra = `<span class="due-soon">⏰ 剩 ${n} 天</span>`;
    else              extra = `<span>剩 ${n} 天</span>`;
  }
  return `<div class="deadline">▸ 截止 ${esc(dateStr)} ${extra}</div>`;
}

function render(data) {
  const projects = data.projects || [];

  const active = projects.filter(p => p.status === 'active').length;
  const done   = projects.filter(p => p.status === 'done').length;
  const todo   = projects.flatMap(p => p.tasks || []).filter(t => !t.done).length;
  const dueSoon = projects.filter(p => {
    if (p.status === 'done') return false;
    const n = daysUntil(p.deadline);
    return n !== null && n >= 0 && n <= 7;
  }).length;

  document.getElementById('stat-active').textContent = active;
  document.getElementById('stat-todo').textContent = todo;
  document.getElementById('stat-done').textContent = done;
  const dueEl = document.getElementById('stat-due');
  dueEl.textContent = dueSoon;
  dueEl.classList.toggle('alert', dueSoon > 0);

  const order = { active: 0, paused: 1, done: 2 };
  const sorted = [...projects].sort((a, b) => (order[a.status] ?? 9) - (order[b.status] ?? 9));

  document.getElementById('cards').innerHTML = sorted.length ? sorted.map(p => {
    const st = STATUS[p.status] || { label: p.status, cls: '' };
    const prog = Math.max(0, Math.min(100, Number(p.progress) || 0));
    const team = (p.team || []).map(m =>
      `<span class="member"><span class="role">${esc(m.role)}</span><span class="name">${esc(m.name)}</span></span>`
    ).join('');
    const tasks = (p.tasks || []).map(t =>
      `<li class="${t.done ? 'done' : ''}"><span class="box">${t.done ? '✓' : ''}</span><span class="txt">${esc(t.text)}</span></li>`
    ).join('');
    const notes = (p.notes || []).slice(0, 2).map(n =>
      `<div class="note"><span class="d">${esc(n.date)}</span>${esc(n.text)}</div>`
    ).join('');
    return `<div class="card">
      <div class="card-head"><h3>${esc(p.name)}</h3><span class="pill ${st.cls}">${esc(st.label)}</span></div>
      <div class="progress-row">
        <div class="progress-track"><div class="progress-fill ${prog >= 100 ? 'full' : ''}" style="width:${prog}%"></div></div>
        <span class="progress-num">${prog}%</span>
      </div>
      ${team ? `<div class="team">${team}</div>` : ''}
      ${deadlineHtml(p.deadline, p.status)}
      ${tasks ? `<ul class="tasks">${tasks}</ul>` : ''}
      ${notes ? `<div class="notes">${notes}</div>` : ''}
    </div>`;
  }).join('') : '<div class="empty">目前沒有專案，跟猿田彥說「新增專案」開始吧</div>';

  const feed = projects
    .flatMap(p => (p.notes || []).map(n => ({ ...n, project: p.name })))
    .sort((a, b) => (b.date || '').localeCompare(a.date || ''))
    .slice(0, 10);
  document.getElementById('feed').innerHTML = feed.length ? feed.map(n =>
    `<div class="feed-item"><span class="d">${esc(n.date)}</span><span class="p">${esc(n.project)}</span><span class="t">${esc(n.text)}</span></div>`
  ).join('') : '<div class="empty">還沒有任何動態</div>';

  if (data.updated) {
    const d = new Date(data.updated);
    document.getElementById('updated').textContent = isNaN(d) ? '' :
      `LAST SYNC ${d.toLocaleString('zh-TW', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit', hour12: false })}`;
  }
}

async function load() {
  try {
    const res = await fetch('data.json?t=' + Date.now(), { cache: 'no-store' });
    if (!res.ok) throw new Error(res.status);
    render(await res.json());
  } catch (e) {
    document.getElementById('updated').textContent = '⚠ SYNC FAILED';
  }
}

load();
setInterval(load, 60000);
</script>
</body>
</html>
